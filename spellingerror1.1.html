<!DOCTYPE html>
<html>

<head>
<meta charset="utf-8">

<script src="dist/jspsych.js"></script>
<script src="dist/plugin-fullscreen.js"></script>
<script src="dist/plugin-html-keyboard-response.js"></script>
<script src="dist/plugin-html-button-response.js"></script>
<script src="dist/plugin-survey-text.js"></script>
<link rel="stylesheet" href="dist/jspsych.css">

</head>

<body></body>

<script>

const jsPsych = initJsPsych({
  on_finish: function() {

    const acc =
      jsPsych.data
        .get()
        .filter({task: "judgement"})
        .select("correct")
        .mean();

const csv = jsPsych.data.get().csv();
const bom = "\uFEFF";
const blob = new Blob([bom + csv], {
  type: "text/csv;charset=utf-8;"
});

const url = URL.createObjectURL(blob);
const a = document.createElement("a");
a.href = url;
a.download = participant_id + "_list" + participant_list + ".csv";
a.click();

URL.revokeObjectURL(url);

  }
});

let timeline = [];
let participant_id = "";

timeline.push({  // 参加者IDの入力

  type: jsPsychSurveyText,

  questions: [
    {
      prompt: '参加者IDを入力してください',
      required: true
    }
  ],

  button_label: '次へ',

on_finish: function(data){

  participant_id = data.response.Q0;

  jsPsych.data.addProperties({
    participant: participant_id,
    list: participant_list
  });

}

});


// 参加者リストをランダムに割り当てる
const participant_list =
  Math.floor(Math.random() * 2) + 1;
  jsPsych.data.addProperties({
  list: participant_list
});

console.log("Assigned list:", participant_list); // デバッグ用に割り当てられたリストをコンソールに表示

// 全画面表示
  var enter_fullscreen = {
  type: jsPsychFullscreen,
  fullscreen_mode: true,
  message: '<p>実験は全画面モードで行われます。</p><p>下のボタンを押すと全画面表示になります。</p>'
};
timeline.push(enter_fullscreen);

// 実験の教示
timeline.push({
  type: jsPsychHtmlButtonResponse,
    stimulus: '<div style="max-width:500px;"><p>この実験では、日本語の文を一語ずつ読んでいただきます。' +
    'スペースキーを押すと次の語が表示されます。</p>' +
    '<p>提示された文に誤りが含まれていた場合、Fキーを押してください。誤りが含まれていない場合はJキーを押してください。</p>' +
    '<p>まず5回の練習を行ってから本計測を行います。それでは、計測を開始するので「開始」ボタンを押して下さい。</p></div>',
  choices: ['開始']
});

// SPRを作る関数
function makeSPRTrial(row, practice=false){

  timeline.push({
    type: jsPsychHtmlKeyboardResponse,
    stimulus: '<div style="font-size:60px">+</div>',
    choices: "NO_KEYS",
    trial_duration: 1000
  });

  const words = row.sentence.split(" ");

  words.forEach((word, index) => {

    timeline.push({
      type: jsPsychHtmlKeyboardResponse,
      stimulus: `<p style="font-size:40px">${word}</p>`,
      choices: [' '],

      data: {
        item: row.item,
        condition: row.condition,
        target_filler: row.target_filler,
        context_freq: row.context_freq,
        error: row.error,
        position: index + 1,
        word: word,
        trial_type: "word"
      }
    });

  });

timeline.push({

type: jsPsychHtmlKeyboardResponse,

stimulus: `
<p>文中にミスはありましたか？</p>
<p>F = はい        J = いいえ</p>`,

choices:['f','j'],

  data:{
    item: row.item,
    condition: row.condition,
    target_filler: row.target_filler,
    context_freq: row.context_freq,
    error: row.error,
    correct_answer: row.correct_answer,
    task: "judgement"
  },

on_finish: function(data){

  data.answer =
    data.response === 'f' ? "yes" : "no";

  data.correct =
    data.answer === data.correct_answer;

}

});

if(practice){

  timeline.push({

    type: jsPsychHtmlKeyboardResponse,

    stimulus: function(){

      const last_trial =
        jsPsych.data.get().last(1).values()[0];

      return last_trial.correct
  ? '<p style="font-size:32px;color:green;">正解です</p>'
  : '<p style="font-size:32px;color:red;">不正解です</p>';

    },

    choices: "NO_KEYS",
    trial_duration: 1000

  });

}

}

// 練習試行を開始する関数
function loadPracticeExperiment(){

fetch("practice.json")
  .then(response => response.json())
  .then(practice_data => {

    const shuffled_practice =
      jsPsych.randomization.shuffle(practice_data);

    shuffled_practice.forEach(row => {

      if (!row.sentence) return;

      makeSPRTrial(row, true);

    });

    timeline.push({
      type: jsPsychHtmlButtonResponse,
      stimulus: `
        <p>練習は終了です。</p>
        <p>本試行を開始します。</p>
      `,
      choices: ['本試行へ']
    });

    loadMainExperiment();

  });

}


// 本試行を開始する関数
function loadMainExperiment(){

fetch("spellingerror_pretest.json")
  .then(response => response.json())
  .then(results => {

    // ターゲットだけ抽出
    const targets = results.filter(row =>

      row.target_filler === "target" &&
      Number(row.list) === participant_list

    );

    // フィラーだけ抽出
    const fillers = results.filter(row =>

      row.target_filler === "filler"

    );

    console.log("targets:", targets.length);
    console.log("fillers:", fillers.length);

    const sampled_fillers =
      jsPsych.randomization.sampleWithoutReplacement(
        fillers,
        44
      );

    const all_trials = [
      ...targets,
      ...sampled_fillers
    ];

    const shuffled =
      jsPsych.randomization.shuffle(all_trials);

    shuffled.forEach(row => {

      if (!row.sentence) return;

      makeSPRTrial(row);

    });

    timeline.push({
      type: jsPsychFullscreen,
      fullscreen_mode: false
    });

    timeline.push({
      type: jsPsychHtmlButtonResponse,
      stimulus: `
        <h2>実験終了です</h2>
        <p>ご協力ありがとうございました。</p>
        <p>保存が完了するまでブラウザを閉じないでください。</p>
      `,
      choices: ['終了']
    });

    jsPsych.run(timeline);

  });

}

loadPracticeExperiment();

</script>

</html>
